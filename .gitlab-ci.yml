# Thermalith release-build pipeline.
#
# Trigger: push a tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`).
# Builds the self-contained, single-file artifacts for every platform using the
# repo's own build scripts (Build.sh -> Package-Platform.sh / Pack-MacApp.sh)
# and exposes them as downloadable GitLab CI artifacts.
#
# On a tag: all platforms + the manual PDF build automatically, then the manual
# `release:github` job (press play) publishes a GitHub release with the artifacts.
# Ordinary branch pushes build nothing - everything is tag-gated, so no pipeline
# is created without a tag.
#
# Host-agnostic by design: no hardcoded instance hostname appears here, so a
# future GitLab domain change (e.g. -> gitlab.evilgeniuslabs.ca) needs no edits.
#
# Version note: artifact filenames come from <Version> in Thermalith.App.csproj,
# NOT from the git tag. Keep the csproj version in step with the tag you push.

# Hard gate: the whole pipeline only ever runs for a tag push. Branch commits,
# merge requests, schedules and the web "Run pipeline" button create nothing.
workflow:
  rules:
    - if: '$CI_COMMIT_TAG'

stages:
  - build
  - release

# --- Windows + Linux artifacts (cross-built on one Linux runner) -------------
# `dotnet publish` is RID-targeted, so a single Linux runner cross-publishes
# win-x64, linux-x64 and linux-arm64 without a Windows or ARM host, and packs the
# Niimbot.Net NuGet. macOS packaging needs a real Mac (codesign/hdiutil), so it
# lives in the separate job below.
build:linux:
  stage: build
  image:
    name: mcr.microsoft.com/dotnet/sdk:10.0   # provides an SDK >= 10.0.204 (global.json)
    # Reuse a cached image instead of re-pulling every job — avoids MCR's anonymous-pull rate limit
    # ("Too many requests"). Falls back to a pull when the image isn't already on the runner.
    pull_policy: ["if-not-present", "always"]
  # Single self-hosted runner today, so this job is left UNTAGGED to land on the
  # only runner. If that runner is set to NOT run untagged jobs, add its tag:
  #   tags: [ <runner-tag> ]
  rules:
    - if: '$CI_COMMIT_TAG'                    # tag pushes only
  before_script:
    # The .NET SDK image is Debian-based: it has tar/gzip but not `zip`, which
    # Package-Platform.sh needs to build the Windows .zip.
    - apt-get update && apt-get install -y --no-install-recommends zip
  script:
    - chmod +x Build.sh Package-Platform.sh Pack-MacApp.sh
    - ./Build.sh win-x64 linux-x64 linux-arm64
  artifacts:
    name: "thermalith-$CI_COMMIT_TAG-win-linux"
    paths:
      - artifacts/thermalith/*/*.zip       # win-x64
      - artifacts/thermalith/*/*.tar.gz    # linux-x64, linux-arm64
      - artifacts/nupkgs/*.nupkg           # Niimbot.Net
    expire_in: 90 days

# --- macOS artifacts (.app bundle + .dmg) ------------------------------------
# Builds on the M4 Mac mini, an always-on self-hosted macOS runner (tag `macos`).
# codesign + hdiutil are macOS-only, so the .app/.dmg can ONLY be produced here.
# The Mac is an always-on appliance, so this runs automatically on a tag like the
# Linux job. (Currently ad-hoc signed only; Developer ID notarization comes later.)
build:macos:
  stage: build
  tags:
    - macos            # M4 Mac mini runner (registered with this tag)
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - chmod +x Build.sh Package-Platform.sh Pack-MacApp.sh
    - ./Build.sh osx-arm64 osx-x64
  artifacts:
    name: "thermalith-$CI_COMMIT_TAG-macos"
    paths:
      - artifacts/thermalith/*/*.dmg       # osx-arm64, osx-x64
    expire_in: 90 days

# --- User manual PDF (pandoc + xelatex) --------------------------------------
# Runs in the official pandoc/latex image (pandoc + TeX Live) — a SEPARATE
# container from the .NET build jobs above. Fonts (Lato + DejaVu Sans) are
# bundled in Documentation/Manual/fonts and loaded via OSFONTDIR by build-pdf.sh,
# so nothing font-related needs installing here. Untagged, so it lands on the
# Linux runner (which runs untagged jobs); the runner pulls this image per-job.
docs:manual:
  stage: build
  image:
    name: pandoc/latex:latest          # TODO: pin to a specific tag once validated
    # The pandoc/latex image has ENTRYPOINT ["pandoc"]; clear it so the runner runs the job shell
    # instead of feeding before_script/script to pandoc (which else fails with "withBinaryFile: does not exist").
    entrypoint: [""]
    pull_policy: ["if-not-present", "always"]   # reuse the cached image (rate-limit friendly)
  rules:
    - if: '$CI_COMMIT_TAG'             # tag pushes only, like the build jobs
  before_script:
    # pandoc/latex is Alpine: bash (the script uses bashisms) + fontconfig (XeTeX font lookup).
    - apk add --no-cache bash fontconfig
    # Make the repo-bundled Lato (body) + DejaVu Sans (glyph fallback) resolvable by name: register them
    # with fontconfig. OSFONTDIR alone doesn't make fontspec find them by name in the clean image.
    - mkdir -p /usr/share/fonts/thermalith && cp Documentation/Manual/fonts/*.ttf /usr/share/fonts/thermalith/ && fc-cache -f
    # The image's TeX Live is behind CTAN, so tlmgr refuses to install until it updates itself first.
    # newunicodechar (used by header.tex) isn't in the base install; fancyhdr is, but install both to be safe.
    - tlmgr update --self
    - tlmgr install fancyhdr newunicodechar
  script:
    - bash Documentation/Manual/build-pdf.sh
  artifacts:
    name: "thermalith-manual-$CI_COMMIT_TAG"
    paths:
      - Documentation/Manual/pdf/Thermalith-User-Manual.pdf
    expire_in: 90 days

# --- Publish a GitHub release (on demand) ------------------------------------
# Pushes the source + tag to the GitHub repo (one-way mirror), then uploads the
# built artifacts to a GitHub release on that tag. Release assets: the 5 binary
# packs (win-x64 .zip, linux-x64 / linux-arm64 .tar.gz, osx-arm64 / osx-x64 .dmg),
# the manual PDF, the Niimbot.Net .nupkg, and printers.json. GitHub adds the
# "Source code (zip/tar.gz)" archives automatically from the pushed tag.
# MANUAL: every tag builds automatically, but you press play here
# to publish — that's the on-demand release gate. Beta vs full is driven by the
# per-tag notes file Documentation/releases/<tag>.md frontmatter:
#   ---
#   title: Thermalith 1.2.0
#   prerelease: false        # true -> published as a GitHub Pre-release
#   ---
#   <release body markdown>
#
# PREREQUISITE: a GitHub fine-grained PAT (Contents: write on the repo) set as a
# masked + protected CI variable named GITHUB_PAT. Until that's set this job
# cannot run. GitHub hosts the public files directly; GitLab CI artifacts (90-day,
# gated) cover the internal/beta audience — there is no GitLab release track.
release:github:
  stage: release
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
  needs:
    - job: build:linux
      artifacts: true
    - job: build:macos
      artifacts: true
    - job: docs:manual
      artifacts: true
  variables:
    GH_REPO: "EvilGeniusLabs-ca/Thermalith"
    GIT_DEPTH: 0   # full clone so the source mirror push to GitHub carries real history, not a shallow tip
  before_script:
    - apk add --no-cache github-cli git
  script:
    - |
      set -e
      export GH_TOKEN="$GITHUB_PAT"

      # Fail fast with a clear message if the token didn't reach the job. A common cause: GITHUB_PAT is
      # set as a *Protected* CI variable but this tag isn't a protected tag, so it isn't injected.
      if [ -z "$GITHUB_PAT" ]; then
        echo "ERROR: GITHUB_PAT is empty. Set it in Settings > CI/CD > Variables (masked). If it's marked"
        echo "Protected, protect the release tags too (Settings > Repository > Protected tags, e.g. v*),"
        echo "or untick Protected on the variable. The token needs Contents: write on $GH_REPO."
        exit 1
      fi

      # One-way source mirror: push this tagged commit (as main) + the tag to GitHub so the repo source
      # is there and the release's auto-generated "Source code (zip/tar.gz)" archives exist. GitLab is the
      # source of truth, so force is intentional. The token-bearing URL is never echoed.
      GH_PUSH_URL="https://x-access-token:${GITHUB_PAT}@github.com/${GH_REPO}.git"
      echo "Mirroring source + ${CI_COMMIT_TAG} to ${GH_REPO}"
      git push --force "$GH_PUSH_URL" "HEAD:refs/heads/main"
      git push --force "$GH_PUSH_URL" "refs/tags/${CI_COMMIT_TAG}"

      NOTES="Documentation/releases/${CI_COMMIT_TAG}.md"
      [ -f "$NOTES" ] || { echo "Missing release notes: $NOTES"; exit 1; }
      TITLE=$(awk -F':[[:space:]]*' '/^title:/{print $2; exit}' "$NOTES")
      PRERELEASE=$(awk -F':[[:space:]]*' '/^prerelease:/{print tolower($2); exit}' "$NOTES")
      awk 'BEGIN{n=0} /^---[[:space:]]*$/{n++; next} n>=2{print}' "$NOTES" > body.md
      [ -n "$TITLE" ] || TITLE="$CI_COMMIT_TAG"
      PREFLAG=""
      if [ "$PRERELEASE" = "true" ]; then PREFLAG="--prerelease"; fi
      ASSETS=$(find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.dmg' -o -name '*.nupkg' \) 2>/dev/null; find Documentation/Manual/pdf -type f -name '*.pdf' 2>/dev/null; ls src/Niimbot.Net/Profiles/printers.json 2>/dev/null)
      echo "Publishing $CI_COMMIT_TAG to $GH_REPO (prerelease=${PRERELEASE:-false})"
      echo "Assets:"; echo "$ASSETS"
      if gh release view "$CI_COMMIT_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
        gh release edit "$CI_COMMIT_TAG" --repo "$GH_REPO" --title "$TITLE" --notes-file body.md $PREFLAG
        gh release upload "$CI_COMMIT_TAG" --repo "$GH_REPO" --clobber $ASSETS
      else
        gh release create "$CI_COMMIT_TAG" --repo "$GH_REPO" --title "$TITLE" --notes-file body.md $PREFLAG $ASSETS
      fi
